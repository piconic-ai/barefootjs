# Vale configuration — prose style checks for the docs surface.
#
# Currently one style: Barefoot.Naming enforces the display name
# "BarefootJS" (the npm package name `barefootjs` and the lowercase
# logotype are intentionally NOT display names and are unaffected —
# the swaps below are case-sensitive).
#
# Run locally:  vale README.md CONTRIBUTING.md docs
# CI:           .github/workflows/ci-docs.yml

StylesPath = styles
MinAlertLevel = error

# Lint MDX as Markdown (no mdx2vast dependency; the naming rule only
# needs plain-text scope).
[formats]
mdx = md

[*.{md,mdx}]
BasedOnStyles = Barefoot
