name = "barefootjs-elysia-example"
main = "container.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[containers]]
class_name = "ElysiaContainer"
image = "./Dockerfile"
# Build from the repo root so the Dockerfile can copy the host-built
# integrations/elysia/dist + integrations/shared/styles.
image_build_context = "../.."
max_instances = 1

[[durable_objects.bindings]]
name = "ELYSIA_CONTAINER"
class_name = "ElysiaContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ElysiaContainer"]

# Two patterns: `/integrations/elysia/*` matches /integrations/elysia/... but
# not the bare /integrations/elysia, so add the no-slash variant explicitly.
[[routes]]
pattern = "barefootjs.dev/integrations/elysia"
zone_name = "barefootjs.dev"

[[routes]]
pattern = "barefootjs.dev/integrations/elysia/*"
zone_name = "barefootjs.dev"

[vars]
BASE_PATH = "/integrations/elysia"
