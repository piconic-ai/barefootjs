name = "barefootjs-php-example"
main = "container.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[containers]]
class_name = "PhpContainer"
image = "./Dockerfile"
max_instances = 1

[[durable_objects.bindings]]
name = "PHP_CONTAINER"
class_name = "PhpContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["PhpContainer"]

# Two patterns: `/integrations/php/*` matches /integrations/php/...
# but not the bare /integrations/php, so add the no-slash variant
# explicitly.
[[routes]]
pattern = "barefootjs.dev/integrations/php"
zone_name = "barefootjs.dev"

[[routes]]
pattern = "barefootjs.dev/integrations/php/*"
zone_name = "barefootjs.dev"

[vars]
BASE_PATH = "/integrations/php"
