name = "barefootjs-hono-example"
main = "server.tsx"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
binding = "ASSETS"
# Let the Worker handle routing so basePath requests like `/integrations/hono/`
# (which map to a directory under ./public and would otherwise 404) fall
# through to the Hono app. Static files are still served from ./public
# because the Worker doesn't register those paths.
run_worker_first = true

# Two patterns because Cloudflare route globs do not match the "/*" suffix
# as empty — `/integrations/hono/*` matches /integrations/hono/counter and
# /integrations/hono/, but not /integrations/hono (no trailing slash), which is the
# canonical URL served by Hono's `app.get('/')` under basePath.
[[routes]]
pattern = "barefootjs.dev/integrations/hono"
zone_name = "barefootjs.dev"

[[routes]]
pattern = "barefootjs.dev/integrations/hono/*"
zone_name = "barefootjs.dev"

[vars]
BASE_PATH = "/integrations/hono"

[dev]
port = 3001
