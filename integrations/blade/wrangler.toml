name = "barefootjs-blade-example"
main = "container.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[containers]]
class_name = "PhpContainer"
image = "./Dockerfile"
max_instances = 1

[[durable_objects.bindings]]
name = "PHP_CONTAINER"
class_name = "PhpContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["PhpContainer"]

# Two patterns: `/integrations/blade/*` matches /integrations/blade/...
# but not the bare /integrations/blade, so add the no-slash variant
# explicitly.
[[routes]]
pattern = "barefootjs.dev/integrations/blade"
zone_name = "barefootjs.dev"

[[routes]]
pattern = "barefootjs.dev/integrations/blade/*"
zone_name = "barefootjs.dev"

[vars]
BASE_PATH = "/integrations/blade"
