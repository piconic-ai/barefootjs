# Development docker-compose for BarefootJS.
#
# Single host port (4000) is exposed; everything else is reached through the
# proxy. BarefootJS compilation (`bun run build`) still runs on the host so
# the JSX iteration loop stays fast — containers bind-mount the host-built
# `dist/` so they pick up recompiled output immediately.
#
# Each service is independent (no `depends_on`), so any subset can be brought
# up for focused debugging:
#
#   docker compose up                        # everything (proxy + 4 services)
#   docker compose up proxy mojolicious      # just one adapter, via proxy
#   docker compose up mojolicious            # adapter only (no proxy)
#
# Production images for the container adapters live next to each integration
# (`Dockerfile`) and are consumed by `wrangler deploy`; the `Dockerfile.dev`
# variants here add watcher tools (air, morbo, bun --watch) and rely on
# bind mounts.

services:
  proxy:
    build:
      context: .
      dockerfile: scripts/Dockerfile.dev-proxy
    ports:
      - "4000:4000"
    working_dir: /workspace
    volumes:
      - ./scripts:/workspace/scripts:ro
    environment:
      DEV_ALL_PORT: "4000"

  hono:
    build:
      context: .
      dockerfile: integrations/hono/Dockerfile.dev
    working_dir: /workspace/integrations/hono
    environment:
      BASE_PATH: /integrations/hono
    volumes:
      # Mount the whole repo so workspace deps (`@barefootjs/*`) resolve via
      # the root node_modules created by `bun install` on the host.
      - .:/workspace:cached

  h3:
    build:
      context: .
      dockerfile: integrations/h3/Dockerfile.dev
    working_dir: /workspace/integrations/h3
    environment:
      BASE_PATH: /integrations/h3
    volumes:
      # Same whole-repo mount as hono: h3 imports the host-built dist/ and
      # the @barefootjs/* workspace deps from the root node_modules.
      - .:/workspace:cached

  elysia:
    build:
      context: .
      dockerfile: integrations/elysia/Dockerfile.dev
    working_dir: /workspace/integrations/elysia
    environment:
      BASE_PATH: /integrations/elysia
    volumes:
      # Same whole-repo mount as hono/h3: Elysia imports the host-built dist/
      # and the @barefootjs/* workspace deps from the root node_modules.
      - .:/workspace:cached

  echo:
    build:
      context: .
      dockerfile: integrations/echo/Dockerfile.dev
    working_dir: /workspace/integrations/echo
    environment:
      APP_ENV: development
      BASE_PATH: /integrations/echo
    volumes:
      - ./integrations/echo:/workspace/integrations/echo
      - ./packages/adapter-go-template/runtime:/workspace/packages/adapter-go-template/runtime
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build

  gin:
    build:
      context: .
      dockerfile: integrations/gin/Dockerfile.dev
    working_dir: /workspace/integrations/gin
    environment:
      APP_ENV: development
      BASE_PATH: /integrations/gin
      PORT: "8081"
    volumes:
      - ./integrations/gin:/workspace/integrations/gin
      - ./packages/adapter-go-template/runtime:/workspace/packages/adapter-go-template/runtime
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build

  chi:
    build:
      context: .
      dockerfile: integrations/chi/Dockerfile.dev
    working_dir: /workspace/integrations/chi
    environment:
      APP_ENV: development
      BASE_PATH: /integrations/chi
      PORT: "8082"
    volumes:
      - ./integrations/chi:/workspace/integrations/chi
      - ./packages/adapter-go-template/runtime:/workspace/packages/adapter-go-template/runtime
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build

  nethttp:
    build:
      context: .
      dockerfile: integrations/nethttp/Dockerfile.dev
    working_dir: /workspace/integrations/nethttp
    environment:
      APP_ENV: development
      BASE_PATH: /integrations/nethttp
      PORT: "8083"
    volumes:
      - ./integrations/nethttp:/workspace/integrations/nethttp
      - ./packages/adapter-go-template/runtime:/workspace/packages/adapter-go-template/runtime
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build

  mojolicious:
    build:
      context: .
      dockerfile: integrations/mojolicious/Dockerfile.dev
    working_dir: /workspace/integrations/mojolicious
    environment:
      BASE_PATH: /integrations/mojolicious
      MOJO_MODE: development
    volumes:
      - ./integrations/mojolicious:/workspace/integrations/mojolicious
      - ./packages/adapter-perl/lib:/workspace/packages/adapter-perl/lib
      - ./packages/adapter-mojolicious/lib:/workspace/packages/adapter-mojolicious/lib

  xslate:
    build:
      context: .
      dockerfile: integrations/xslate/Dockerfile.dev
    working_dir: /workspace/integrations/xslate
    environment:
      BASE_PATH: /integrations/xslate
      PLACK_ENV: development
    volumes:
      - ./integrations/xslate:/workspace/integrations/xslate
      - ./packages/adapter-perl/lib:/workspace/packages/adapter-perl/lib
      - ./packages/adapter-xslate/lib:/workspace/packages/adapter-xslate/lib

  flask:
    build:
      context: .
      dockerfile: integrations/flask/Dockerfile.dev
    working_dir: /workspace/integrations/flask
    environment:
      BASE_PATH: /integrations/flask
      FLASK_ENV: development
    volumes:
      - ./integrations/flask:/workspace/integrations/flask
      # app.py's sys.path fallback resolves `barefootjs` from the workspace
      # source dir directly (mirrors xslate's `use lib '../../packages/...'`
      # fallback) so local dev works without running assemble-deps first.
      - ./packages/adapter-jinja/python:/workspace/packages/adapter-jinja/python

  fastapi:
    build:
      context: .
      dockerfile: integrations/fastapi/Dockerfile.dev
    working_dir: /workspace/integrations/fastapi
    environment:
      BASE_PATH: /integrations/fastapi
      FASTAPI_ENV: development
    volumes:
      - ./integrations/fastapi:/workspace/integrations/fastapi
      # app.py's sys.path fallback resolves `barefootjs` from the workspace
      # source dir directly (mirrors xslate's `use lib '../../packages/...'`
      # fallback) so local dev works without running assemble-deps first.
      - ./packages/adapter-jinja/python:/workspace/packages/adapter-jinja/python

  sinatra:
    build:
      context: .
      dockerfile: integrations/sinatra/Dockerfile.dev
    working_dir: /workspace/integrations/sinatra
    environment:
      BASE_PATH: /integrations/sinatra
      RACK_ENV: development
    volumes:
      - ./integrations/sinatra:/workspace/integrations/sinatra
      - ./packages/adapter-erb/lib:/workspace/packages/adapter-erb/lib

  rails:
    build:
      context: .
      dockerfile: integrations/rails/Dockerfile.dev
    working_dir: /workspace/integrations/rails
    environment:
      BASE_PATH: /integrations/rails
      RAILS_ENV: development
    volumes:
      - ./integrations/rails:/workspace/integrations/rails
      - ./packages/adapter-erb/lib:/workspace/packages/adapter-erb/lib

  axum:
    build:
      context: .
      dockerfile: integrations/axum/Dockerfile.dev
    working_dir: /workspace/integrations/axum
    environment:
      BASE_PATH: /integrations/axum
      PORT: "3012"
    volumes:
      - ./integrations/axum:/workspace/integrations/axum
      - ./packages/adapter-rust/runtime:/workspace/packages/adapter-rust/runtime
      - cargo-registry:/root/.cargo/registry
      - cargo-target-cache:/workspace/integrations/axum/target

  php:
    build:
      context: .
      dockerfile: integrations/php/Dockerfile.dev
    working_dir: /workspace/integrations/php
    environment:
      BASE_PATH: /integrations/php
      PHP_ENV: development
      PORT: "3013"
    volumes:
      - ./integrations/php:/workspace/integrations/php
      # index.php's autoload fallback resolves the Barefoot\ runtime from
      # the workspace source dir directly (mirrors flask's sys.path
      # fallback) so local dev works without running assemble-deps first.
      - ./packages/adapter-twig/php:/workspace/packages/adapter-twig/php

  site-core:
    build:
      context: .
      dockerfile: site/core/Dockerfile.dev
    working_dir: /workspace/site/core
    volumes:
      - .:/workspace:cached

volumes:
  go-mod-cache:
  go-build-cache:
  cargo-registry:
  cargo-target-cache:
