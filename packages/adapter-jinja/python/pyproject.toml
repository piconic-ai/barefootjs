[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "barefootjs"
dynamic = ["version"]
description = "Python runtime for the @barefootjs/jinja adapter"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [{ name = "kobaken", email = "kentafly88@gmail.com" }]
keywords = ["jinja", "jinja2", "barefoot", "ssr", "templates"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
# tzdata (#2344): IANA data for zoneinfo-based named-zone resolution in
# `format_date` on platforms without a system zoneinfo directory (Windows,
# slim containers); zoneinfo prefers the system copy where one exists.
dependencies = ["jinja2>=3.1", "markupsafe>=2.0", "tzdata>=2024.1"]

[project.urls]
Homepage = "https://github.com/piconic-ai/barefootjs"
Repository = "https://github.com/piconic-ai/barefootjs"

[tool.setuptools.packages.find]
include = ["barefootjs*"]

[tool.setuptools.dynamic]
version = {file = "VERSION"}
