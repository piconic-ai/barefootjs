[package]
name = "barefootjs"
# Placeholder — the crates-release job stamps the @barefootjs/rust version
# resolved by changesets over this value before `cargo publish`.
version = "0.1.0"
edition = "2021"
description = "Rust runtime for BarefootJS marked templates (minijinja adapter)."
license = "MIT"
readme = "README.md"
homepage = "https://barefootjs.dev"
repository = "https://github.com/piconic-ai/barefootjs"

[lib]
name = "barefootjs"
path = "src/lib.rs"

[[bin]]
name = "bf-render"
path = "src/bin/bf-render.rs"

[dependencies]
minijinja = { version = "2", features = ["loader"] }
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["float_roundtrip"] }
# #2344 named-IANA-zone resolution in `format_date` (src/date.rs). chrono-tz
# embeds tzdata at a release pinned per crate version, so zone resolution is
# deterministic per build — no host tzdata read. The narrow feature set
# keeps chrono's clock ("now") API out: helpers must stay pure functions.
chrono = { version = "0.4", default-features = false, features = ["std"] }
chrono-tz = "0.10"

[dev-dependencies]
