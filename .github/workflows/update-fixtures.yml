name: Update Fixtures

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/jsx/**'
      - 'packages/adapter-hono/**'
      - 'packages/client/**'
      - 'packages/adapter-tests/src/**'
      - 'packages/adapter-tests/scripts/**'
      # Shared-component fixture sources (fixture-hydrate corpus inputs).
      # Editing a `*.tsx` here regenerates the `__snapshots__/<id>.{html,client.js}` pair.
      - 'integrations/shared/components/**'
      # Fixture spec files (adding a new fixture, changing its props, or
      # adjusting `componentName` / `sourceFile` / `additionalComponents`
      # changes the snapshot output).
      - 'packages/adapter-tests/fixtures/**'

permissions:
  contents: write

concurrency:
  group: update-fixtures-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  update-expected-html:
    runs-on: ubuntu-latest
    # Skip fork PRs (no write permission)
    if: github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/client' build
          bun run --filter '@barefootjs/hono' build

      - name: Generate expectedHtml
        run: bun run packages/adapter-tests/scripts/generate-expected-html.ts

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet packages/adapter-tests/fixtures/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/adapter-tests/fixtures/
          git commit -m "Update fixture expectedHtml (auto-generated)"
          git push
