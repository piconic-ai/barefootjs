name: CI — h3 Integration

on:
  push:
    branches: [main]
    paths:
      - 'packages/client/**'
      - 'packages/jsx/**'
      - 'packages/adapter-hono/**'
      - 'integrations/h3/**'
      - 'integrations/shared/**'
      - '.github/workflows/ci-h3.yml'
  pull_request:
    paths:
      - 'packages/client/**'
      - 'packages/jsx/**'
      - 'packages/adapter-hono/**'
      - 'integrations/h3/**'
      - 'integrations/shared/**'
      - '.github/workflows/ci-h3.yml'

permissions:
  contents: read

jobs:
  e2e-h3:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install dependencies
        run: bun install

      # The h3 server imports compiled SSR templates from @barefootjs/hono and
      # the runtime bundle (barefoot.js) from @barefootjs/client, so build the
      # packages before the integration build that the Playwright webServer runs.
      - name: Build packages
        run: |
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/client' build
          bun run --filter '@barefootjs/hono' build

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package.json') }}

      - name: Install Playwright browser binaries
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install chromium

      - name: Run integrations/h3 E2E tests
        run: cd integrations/h3 && bun run test:e2e

      - name: Upload Playwright report (integrations/h3)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-integrations-h3
          path: integrations/h3/playwright-report/
          retention-days: 30
