# Automated release via Changesets.
#
# When .changeset/*.md files are present on main → opens a "Version Packages" PR.
# When that PR is merged (no changeset files remain) → builds and publishes.
#
# npm / JSR:
#   - `bun pm pack` to resolve workspace:* protocol references
#   - `npm publish <tarball> --provenance` for OIDC auth + provenance attestation
#   - No long-lived NPM_TOKEN needed — uses npm Trusted Publishing (OIDC).
#   - Requires npm CLI >= 11.5.1 for OIDC support (Node 22 ships npm 10).
#   Prerequisites (one-time setup on npmjs.com):
#     For each package (or at org level for @barefootjs):
#       Package settings → Trusted Publishers → Add GitHub Actions
#         Repository: piconic-ai/barefootjs
#         Workflow:   release.yml
#
# Native runtimes:
#   - cpan-release publishes Perl dists that correspond to bumped npm packages.
#   - pypi-release / rubygems-release / crates-release / packagist-*-release
#     follow the same pattern for first-party Python, Ruby, Rust, and PHP
#     runtimes: when the corresponding adapter package is published by
#     Changesets, build/test the native runtime and publish it with registry
#     secrets. These jobs depend only on the npm release job, so they run in
#     parallel with each other and with cpan-release.
#   Package → native registry mapping:
#     @barefootjs/perl         CPAN BarefootJS
#     @barefootjs/mojolicious  CPAN Mojolicious::Plugin::BarefootJS
#     @barefootjs/xslate       CPAN BarefootJS::Backend::Xslate
#     @barefootjs/jinja        PyPI barefootjs
#     @barefootjs/erb          RubyGems barefoot_js
#     @barefootjs/rust         crates.io barefootjs
#     @barefootjs/twig         Packagist barefootjs/twig (via split mirror)
#     @barefootjs/blade        Packagist barefootjs/blade (via split mirror)
#     @barefootjs/php          Packagist barefootjs/php (via split mirror,
#                              packages/adapter-php -- the engine-agnostic
#                              runtime shared by the Twig/Blade/... backends)

name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Backstop so a hung step (e.g. a stalled JSR/npm publish) can't keep the
    # job — and with it the `release-main` concurrency slot — open for the
    # default 6h, blocking every queued release run behind it.
    timeout-minutes: 30
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '24'

      - run: bun install

      - name: Changesets — version or publish
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: bunx changeset version
          publish: bun run release:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Mirror whatever Changesets just published to npm onto JSR. Delegates to
  # the reusable jsr-publish.yml so the release-driven path and the manual
  # workflow_dispatch re-run share one implementation. The script self-skips
  # versions already live on JSR, so an unconditional run only publishes the
  # freshly-bumped set — keeping the two registries in lock-step. Gated on a
  # real publish so version-PR runs don't touch JSR.
  jsr-release:
    needs: release
    if: needs.release.outputs.published == 'true'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/jsr-publish.yml

  cpan-release:
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    # Same backstop: a stalled CPAN upload shouldn't hold the run open for 6h.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Sync Perl versions and commit
        run: |
          bun scripts/sync-perl-versions.ts
          if ! git diff --quiet; then
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git add packages/adapter-perl packages/adapter-mojolicious packages/adapter-xslate
            git commit -m "chore: sync Perl \$VERSION and Changes [skip ci]"
            git push
          fi

      - name: Setup Perl
        uses: shogo82148/actions-setup-perl@3d3cb73ca65d657a809d97eab324d4e4f140bf5e # v1
        with:
          perl-version: '5.40'

      - name: Install Perl build tools
        # Workflow tooling only; each dist's prereqs come from its cpanfile
        # via `cpanm --installdeps` below.
        run: cpanm --notest Module::CPANfile CPAN::Uploader

      - name: Publish to CPAN
        env:
          PAUSE_ID: ${{ secrets.PAUSE_ID }}
          PAUSE_PASSWORD: ${{ secrets.PAUSE_PASSWORD }}
          PUBLISHED: ${{ needs.release.outputs.publishedPackages }}
        run: |
          published=$(echo "$PUBLISHED" | jq -r '.[].name')

          # Publish core (BarefootJS) first and install locally so backend
          # dists can resolve their `requires 'BarefootJS'` at build time.
          if echo "$published" | grep -qx '@barefootjs/perl'; then
            echo "Publishing packages/adapter-perl to CPAN..."
            cd packages/adapter-perl
            # installdeps from the cpanfile; keep these on separate lines (not
            # `&&`) so a failure aborts under `set -e` rather than silently
            # skipping the upload.
            cpanm --notest --installdeps .
            perl Makefile.PL
            make test
            make dist
            cpan-upload -u "$PAUSE_ID" -p "$PAUSE_PASSWORD" ./*.tar.gz
            cpanm --notest ./*.tar.gz
            cd -
          fi

          # Backend dists (both depend on BarefootJS).
          for pair in '@barefootjs/mojolicious:packages/adapter-mojolicious' '@barefootjs/xslate:packages/adapter-xslate'; do
            name="${pair%%:*}"
            dir="${pair##*:}"
            echo "$published" | grep -qx "$name" || continue
            echo "Publishing $dir to CPAN..."
            cd "$dir"
            # `requires 'BarefootJS'` resolves against the core dist installed above.
            cpanm --notest --installdeps .
            perl Makefile.PL
            make test
            make dist
            cpan-upload -u "$PAUSE_ID" -p "$PAUSE_PASSWORD" ./*.tar.gz
            cd -
          done
  pypi-release:
    needs: release
    if: needs.release.outputs.published == 'true' && contains(fromJSON(needs.release.outputs.publishedPackages).*.name, '@barefootjs/jinja')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Publishes via PyPI Trusted Publishing (OIDC): the `barefootjs` project on
    # PyPI trusts this repo + release.yml, so no long-lived PYPI_API_TOKEN is
    # involved. Managed at pypi.org → barefootjs → Manage → Publishing.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Build and test Python runtime
        working-directory: packages/adapter-jinja/python
        run: |
          test -f pyproject.toml
          version=$(jq -r '.version' ../package.json)
          echo "$version" > VERSION
          python -m pip install --upgrade build twine pytest jinja2
          python -m pytest
          python -m build
          python -m twine check dist/*

      - name: Publish Python runtime to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          packages-dir: packages/adapter-jinja/python/dist

  rubygems-release:
    needs: release
    if: needs.release.outputs.published == 'true' && contains(fromJSON(needs.release.outputs.publishedPackages).*.name, '@barefootjs/erb')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Publishes via RubyGems Trusted Publishing (OIDC): the barefoot_js gem
    # trusts this repo + release.yml, so no long-lived RUBYGEMS_API_KEY is
    # involved. Managed at rubygems.org → barefoot_js → Trusted publishers.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Ruby
        uses: ruby/setup-ruby@a30dfa457ad68707b8b910ac3a244714b61c0626 # v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Authenticate with RubyGems
        # No inputs → trusted-publisher mode; exports a temporary
        # GEM_HOST_API_KEY for the `gem push` below.
        uses: rubygems/configure-rubygems-credentials@dc5a8d8553e6ee01fc26761a49e99e733d17954a # v2.1.0

      - name: Build, test, and publish Ruby runtime to RubyGems
        working-directory: packages/adapter-erb
        run: |
          gemspec=$(find . -maxdepth 1 -name '*.gemspec' -print -quit)
          test -n "$gemspec"
          ruby -Ilib -Itest -e 'Dir["test/**/*_test.rb"].sort.each { |f| require_relative f }'
          gem build "$gemspec"
          gem push ./*.gem

  crates-release:
    needs: release
    if: needs.release.outputs.published == 'true' && contains(fromJSON(needs.release.outputs.publishedPackages).*.name, '@barefootjs/rust')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Publishes via crates.io Trusted Publishing (OIDC): the `barefootjs` crate
    # trusts this repo + release.yml, so no long-lived CARGO_REGISTRY_TOKEN is
    # involved. Managed at crates.io → barefootjs → Settings → Trusted Publishing.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4305c38b25d97ef35a8ad1f985ccf2d2242004f2 # stable
        with:
          toolchain: stable

      - name: Sync crate version from @barefootjs/rust
        working-directory: packages/adapter-rust/runtime
        # Cargo.toml carries a placeholder version (crates.io shipped 0.1.0 on
        # the initial release because nothing stamped it). The crate must ship
        # at the @barefootjs/rust version resolved by changesets, so write it
        # in before publishing. Not committed back: unlike the Perl sync (which
        # pushes to main from the cpan-release job), a second job pushing to
        # main would race it; `--allow-dirty` below tolerates the working-tree
        # edit instead.
        run: |
          version=$(jq -r '.version' ../package.json)
          test -n "$version"
          test "$version" != "null"
          sed -i "0,/^version = \".*\"/s//version = \"${version}\"/" Cargo.toml
          grep -Fxq "version = \"${version}\"" Cargo.toml

      - name: Authenticate with crates.io
        id: crates-auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1

      - name: Build, test, and publish Rust runtime to crates.io
        working-directory: packages/adapter-rust/runtime
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
        run: |
          cargo test
          cargo publish --dry-run --allow-dirty
          cargo publish --allow-dirty
  packagist-twig-release:
    needs: release
    if: needs.release.outputs.published == 'true' && contains(fromJSON(needs.release.outputs.publishedPackages).*.name, '@barefootjs/twig')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          # The split push authenticates via PHP_SPLIT_REPO_TOKEN embedded in
          # the remote URL. checkout's persisted GITHUB_TOKEN is injected as an
          # http.extraheader Authorization header on every github.com request,
          # which preempts the 401 challenge that URL credentials answer — so
          # the push would authenticate as github-actions[bot] (no access to
          # the split repos) and fail with 403.
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Validate Twig backend package
        working-directory: packages/adapter-twig/php
        # NOT --strict: this package intentionally requires barefootjs/php
        # as an unbound `@dev` constraint (resolved via the `path` repository
        # pointing at ../../adapter-php, see composer.json) so the in-monorepo
        # dependency doesn't need a manually-maintained semver range kept in
        # lock-step with packages/adapter-php's own version -- `--strict`
        # flags that as an "unbound version constraint" warning-as-error.
        run: |
          composer validate
          composer install --no-interaction --prefer-dist
          if jq -e '.scripts.test' composer.json > /dev/null 2>&1; then
            composer test
          fi

      - name: Push Twig backend split to Packagist mirror
        env:
          PHP_SPLIT_REPOSITORY: ${{ vars.PHP_SPLIT_REPOSITORY || 'piconic-ai/barefootjs-twig' }}
          PHP_SPLIT_REPO_TOKEN: ${{ secrets.PHP_SPLIT_REPO_TOKEN }}
        run: |
          version=$(jq -r '.version' packages/adapter-twig/package.json)
          test -n "$version"
          test "$version" != "null"

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git branch -D php-twig-release 2>/dev/null || true
          git subtree split --prefix=packages/adapter-twig/php -b php-twig-release

          split_dir=$(mktemp -d)
          git worktree add "$split_dir" php-twig-release
          jq --arg version "$version" 'del(.repositories) | .require["barefootjs/php"] = $version' \
            "$split_dir/composer.json" > "$split_dir/composer.json.tmp"
          mv "$split_dir/composer.json.tmp" "$split_dir/composer.json"
          composer validate --working-dir="$split_dir" --strict
          git -C "$split_dir" add composer.json
          git -C "$split_dir" commit -m "chore: prepare barefootjs/twig ${version} for Packagist"
          split_ref=$(git -C "$split_dir" rev-parse HEAD)

          remote="https://x-access-token:${PHP_SPLIT_REPO_TOKEN}@github.com/${PHP_SPLIT_REPOSITORY}.git"
          git push --force "$remote" "${split_ref}:main"
          git tag -f "v${version}" "$split_ref"
          git push --force "$remote" "v${version}"
          git worktree remove "$split_dir" --force

      - name: Notify Packagist
        env:
          # Must be the API token's owner, not the "barefootjs" vendor namespace.
          PACKAGIST_USERNAME: ${{ vars.PACKAGIST_USERNAME || 'kfly8' }}
          PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}
        run: |
          # Bearer "username:token" auth per https://packagist.org/apidoc.
          curl -sSf -X POST \
            -H 'Content-Type: application/json' \
            -H "Authorization: Bearer ${PACKAGIST_USERNAME}:${PACKAGIST_API_TOKEN}" \
            'https://packagist.org/api/update-package' \
            -d '{"repository":"https://packagist.org/packages/barefootjs/twig"}'

  packagist-blade-release:
    needs: release
    if: needs.release.outputs.published == 'true' && contains(fromJSON(needs.release.outputs.publishedPackages).*.name, '@barefootjs/blade')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          # The split push authenticates via PHP_SPLIT_REPO_TOKEN embedded in
          # the remote URL. checkout's persisted GITHUB_TOKEN is injected as an
          # http.extraheader Authorization header on every github.com request,
          # which preempts the 401 challenge that URL credentials answer — so
          # the push would authenticate as github-actions[bot] (no access to
          # the split repos) and fail with 403.
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Validate Blade backend package
        working-directory: packages/adapter-blade/php
        # NOT --strict: this package intentionally requires barefootjs/php
        # as an unbound `@dev` constraint resolved through the monorepo path
        # repository, matching the Twig backend package.
        run: |
          composer validate
          composer install --no-interaction --prefer-dist
          if jq -e '.scripts.test' composer.json > /dev/null 2>&1; then
            composer test
          fi

      - name: Push Blade backend split to Packagist mirror
        env:
          PHP_BLADE_SPLIT_REPOSITORY: ${{ vars.PHP_BLADE_SPLIT_REPOSITORY || 'piconic-ai/barefootjs-blade' }}
          PHP_SPLIT_REPO_TOKEN: ${{ secrets.PHP_SPLIT_REPO_TOKEN }}
        run: |
          version=$(jq -r '.version' packages/adapter-blade/package.json)
          test -n "$version"
          test "$version" != "null"

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git branch -D php-blade-release 2>/dev/null || true
          git subtree split --prefix=packages/adapter-blade/php -b php-blade-release

          split_dir=$(mktemp -d)
          git worktree add "$split_dir" php-blade-release
          jq --arg version "$version" 'del(.repositories) | .require["barefootjs/php"] = $version' \
            "$split_dir/composer.json" > "$split_dir/composer.json.tmp"
          mv "$split_dir/composer.json.tmp" "$split_dir/composer.json"
          composer validate --working-dir="$split_dir" --strict
          git -C "$split_dir" add composer.json
          git -C "$split_dir" commit -m "chore: prepare barefootjs/blade ${version} for Packagist"
          split_ref=$(git -C "$split_dir" rev-parse HEAD)

          remote="https://x-access-token:${PHP_SPLIT_REPO_TOKEN}@github.com/${PHP_BLADE_SPLIT_REPOSITORY}.git"
          git push --force "$remote" "${split_ref}:main"
          git tag -f "v${version}" "$split_ref"
          git push --force "$remote" "v${version}"
          git worktree remove "$split_dir" --force

      - name: Notify Packagist
        env:
          PACKAGIST_USERNAME: ${{ vars.PACKAGIST_USERNAME || 'kfly8' }}
          PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}
        run: |
          curl -sSf -X POST \
            -H 'Content-Type: application/json' \
            -H "Authorization: Bearer ${PACKAGIST_USERNAME}:${PACKAGIST_API_TOKEN}" \
            'https://packagist.org/api/update-package' \
            -d '{"repository":"https://packagist.org/packages/barefootjs/blade"}'

  # Mirrors packagist-twig-release's shape for the engine-agnostic PHP runtime
  # package (packages/adapter-php, Composer name barefootjs/php) --
  # gated on @barefootjs/php (not @barefootjs/twig) being the package
  # Changesets just published, since the runtime and the Twig backend are
  # versioned/published independently.
  packagist-php-release:
    needs: release
    if: needs.release.outputs.published == 'true' && contains(fromJSON(needs.release.outputs.publishedPackages).*.name, '@barefootjs/php')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          # The split push authenticates via PHP_SPLIT_REPO_TOKEN embedded in
          # the remote URL. checkout's persisted GITHUB_TOKEN is injected as an
          # http.extraheader Authorization header on every github.com request,
          # which preempts the 401 challenge that URL credentials answer — so
          # the push would authenticate as github-actions[bot] (no access to
          # the split repos) and fail with 403.
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Validate PHP runtime
        working-directory: packages/adapter-php
        run: |
          composer validate --strict
          composer install --no-interaction --prefer-dist
          if composer run-script --list | grep -q '^  test'; then
            composer test
          fi

      - name: Push PHP runtime split to Packagist mirror
        env:
          PHP_RUNTIME_SPLIT_REPOSITORY: ${{ vars.PHP_RUNTIME_SPLIT_REPOSITORY || 'piconic-ai/barefootjs-php' }}
          PHP_SPLIT_REPO_TOKEN: ${{ secrets.PHP_SPLIT_REPO_TOKEN }}
        run: |
          version=$(jq -r '.version' packages/adapter-php/package.json)
          test -n "$version"
          test "$version" != "null"

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git branch -D php-runtime-release-shared 2>/dev/null || true
          git subtree split --prefix=packages/adapter-php -b php-runtime-release-shared

          remote="https://x-access-token:${PHP_SPLIT_REPO_TOKEN}@github.com/${PHP_RUNTIME_SPLIT_REPOSITORY}.git"
          git push --force "$remote" php-runtime-release-shared:main
          git tag -f "v${version}" php-runtime-release-shared
          git push --force "$remote" "v${version}"

      - name: Notify Packagist
        env:
          PACKAGIST_USERNAME: ${{ vars.PACKAGIST_USERNAME || 'kfly8' }}
          PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}
        run: |
          curl -sSf -X POST \
            -H 'Content-Type: application/json' \
            -H "Authorization: Bearer ${PACKAGIST_USERNAME}:${PACKAGIST_API_TOKEN}" \
            'https://packagist.org/api/update-package' \
            -d '{"repository":"https://packagist.org/packages/barefootjs/php"}'
