name: Benchmark

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/client/**'
      - 'benchmarks/**'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Build packages (benchmark apps bundle from published dists)
        run: |
          bun run --filter '@barefootjs/shared' build
          bun run --filter '@barefootjs/streaming' build
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/client' build

      - name: Build benchmark apps
        run: |
          bun benchmarks/runner/build.ts
          for f in react solid barefoot; do
            bun "benchmarks/ssr/apps/$f/build.ts"
          done

      # Write the result into GITHUB_OUTPUT even when the bench itself
      # fails: `bash -e` would otherwise abort mid-heredoc, truncating the
      # multiline block ("Matching delimiter not found") and masking the
      # real error.
      - name: Run DOM benchmark (quick)
        id: bench
        run: |
          set +e
          bun benchmarks/runner/bench-dom.ts --quick --md > /tmp/bench-dom.out 2>&1
          status=$?
          {
            echo 'result<<BENCH_EOF'
            cat /tmp/bench-dom.out
            echo 'BENCH_EOF'
          } >> "$GITHUB_OUTPUT"
          cat /tmp/bench-dom.out
          exit $status

      - name: Run SSR benchmark
        id: bench_ssr
        run: |
          set +e
          bun benchmarks/ssr/bench-ssr.ts --md > /tmp/bench-ssr.out 2>&1
          status=$?
          {
            echo 'result<<BENCH_EOF'
            cat /tmp/bench-ssr.out
            echo 'BENCH_EOF'
          } >> "$GITHUB_OUTPUT"
          cat /tmp/bench-ssr.out
          exit $status

      - name: Find existing benchmark comment
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4.0.0
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '## Benchmark Results'

      - name: Post benchmark results
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            ## Benchmark Results

            > Quick mode (reduced iterations) on shared CI hardware — treat as a
            > smoke check for regressions, not as publishable numbers. Run the
            > full suite locally per `benchmarks/README.md` for real comparisons.

            ### DOM update suite

            ${{ steps.bench.outputs.result }}

            ### SSR + hydration

            ${{ steps.bench_ssr.outputs.result }}

            [Job log](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) · `${{ github.event.pull_request.head.sha }}`
