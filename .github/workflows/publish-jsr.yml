# Publish to JSR (https://jsr.io/@barefootjs) — manual / backfill.
#
# The automatic JSR publish runs as a step in release.yml off the same
# Changesets bump that publishes to npm (see `scripts/jsr-publish.ts`).
# This workflow is the manual escape hatch: re-run a publish, or
# `dry_run` to preview the generated JSR manifests for every eligible
# `@barefootjs/*` package without publishing.
#
# Packages and their JSR manifests are discovered + generated
# dynamically from each package.json, so there is nothing to maintain
# here when a package is added — it is picked up automatically.
#
# Prerequisite (on jsr.io): the `@barefootjs` scope exists; each package
# must be created under it and linked to GitHub repo
# piconic-ai/barefootjs so OIDC publishing is authorized.
name: Publish to JSR (manual)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview generated manifests without publishing'
        type: boolean
        default: false

concurrency:
  group: publish-jsr-manual
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      # Floating major tag (other workflows SHA-pin their actions; pin
      # this to a verified denoland/setup-deno commit in a follow-up).
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Publish (or preview) JSR packages
        run: bun scripts/jsr-publish.ts ${{ inputs.dry_run && '--dry-run' || '' }}
