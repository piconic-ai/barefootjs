name: Compat — issue-link freshness

# The compatibility-matrix page links every limitation cell to the GitHub
# issue tracking it (baked into ui/compat.lock.json + ui/support-matrix.lock.json
# from each adapter's conformance-pins / render-divergences). The ci-compat
# drift gate proves the locks match the CODE — it cannot see when a linked
# issue is CLOSED but the pin still points at it, which makes the published
# matrix link a live limitation to a completed ticket and read as stale.
#
# This scheduled job is that missing detector: it asks GitHub whether every
# referenced issue is still open and, when any is closed, opens/updates a
# single alert issue for a human to re-point or remove the pin. When nothing
# is stale it closes the alert issue, so the tracker is self-healing.

on:
  schedule:
    # Weekly, Monday 00:17 UTC (off the hour to dodge the scheduler surge).
    - cron: '17 0 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: compat-issue-freshness
  cancel-in-progress: false

jobs:
  freshness:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      # The checker reads only the committed lock JSON + node built-ins +
      # fetch, so no workspace build is needed — just run the file directly.
      - name: Check referenced issue states
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bun run packages/compat/src/issue-freshness-cli.ts --report-file "$RUNNER_TEMP/report.md"

      - name: Open or update alert issue
        if: steps.check.outputs.stale == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs')
            const marker = '<!-- compat-issue-freshness -->'
            const body = `${marker}\n\n` +
              fs.readFileSync(process.env.RUNNER_TEMP + '/report.md', 'utf8') +
              `\n\n---\n_Auto-generated by [\`compat-issue-freshness\`](../blob/main/.github/workflows/compat-issue-freshness.yml). ` +
              `This issue closes itself once every referenced link points at an open issue again._`
            const title = '🔗 Compatibility matrix links a closed issue'

            const existing = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:body "${marker}"`,
            })
            const hit = existing.data.items[0]
            if (hit) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: hit.number, title, body,
              })
              core.notice(`Updated alert issue #${hit.number}`)
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['known-limitation'],
              })
              core.notice(`Opened alert issue #${created.data.number}`)
            }

      - name: Close stale alert issue when clean
        if: steps.check.outputs.stale == 'false'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const marker = '<!-- compat-issue-freshness -->'
            const existing = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:body "${marker}"`,
            })
            for (const hit of existing.data.items) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: hit.number,
                body: 'All referenced compatibility-matrix links point at open issues again — closing automatically.',
              })
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: hit.number, state: 'closed', state_reason: 'completed',
              })
              core.notice(`Closed resolved alert issue #${hit.number}`)
            }
