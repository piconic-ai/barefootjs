name: Update Meta

# Mirror of `update-fixtures.yml` but for `ui/meta/*.json` and the
# `llms.txt` files that derive from it. Without this workflow, `bf meta
# extract` only ran inside `deploy-ui` (and even there the result was
# baked into a Cloudflare Workers artefact, never committed back), so
# the checked-in meta silently drifted from `ui/components/ui/` between
# regenerations. Issue #1435 was the visible symptom — `bf add
# checkbox` lost its `icon` dependency because `ui/meta/checkbox.json`
# still said `dependencies.internal: []`.

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/cli/**'
      - 'packages/jsx/**'
      - 'packages/client/**'
      - 'ui/components/ui/**'
      - 'docs/core/**'
      - '.github/workflows/update-meta.yml'

permissions:
  contents: write

concurrency:
  group: update-meta-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  update-meta:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip fork PRs (no write permission to push back to the head branch).
    if: github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install dependencies
        run: bun install

      - name: Build packages
        # `bf meta extract` calls into `analyzeComponent` from
        # `@barefootjs/jsx`, which needs to be built before it can be
        # resolved by the CLI entrypoint.
        run: |
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/client' build

      - name: Extract component metadata
        run: bun run meta:extract

      - name: Check for changes
        id: diff
        run: |
          # `--` disambiguates the pathspecs from revisions; without it,
          # `git diff --quiet docs/core/llms.txt` errors with
          # "ambiguous argument" when docs/core/llms.txt is clean.
          if git diff --quiet -- ui/meta/ docs/core/llms.txt; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ui/meta/ docs/core/llms.txt
          git commit -m "Update ui/meta and llms.txt (auto-generated)"
          git push
