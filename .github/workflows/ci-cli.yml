name: CI — CLI

on:
  push:
    branches: [main]
    paths:
      - 'packages/cli/**'
      - 'packages/client/**'
      - 'packages/jsx/**'
      - 'ui/**'
      - '.github/workflows/ci-cli.yml'
  pull_request:
    paths:
      - 'packages/cli/**'
      - 'packages/client/**'
      - 'packages/jsx/**'
      - 'ui/**'
      - '.github/workflows/ci-cli.yml'

permissions:
  contents: read

concurrency:
  group: ci-cli-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/client' build

      - name: Embed adapter runtime sources
        run: bun run --filter '@barefootjs/cli' embed-runtimes

      - name: Run unit tests
        run: cd packages/cli && bun test
