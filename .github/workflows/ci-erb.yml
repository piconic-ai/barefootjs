name: CI — ERB Adapter

on:
  push:
    branches: [main]
    paths:
      - 'packages/client/**'
      - 'packages/shared/**'
      - 'packages/jsx/**'
      - 'packages/adapter-erb/**'
      - 'packages/adapter-tests/**'
      - '.github/workflows/ci-erb.yml'
  pull_request:
    paths:
      - 'packages/client/**'
      - 'packages/shared/**'
      - 'packages/jsx/**'
      - 'packages/adapter-erb/**'
      - 'packages/adapter-tests/**'
      - '.github/workflows/ci-erb.yml'
  # Nightly full-matrix data-point conformance (#2278): PR/push runs the
  # fast `pr` tier (sampled generated points); the scheduled run exercises
  # every generated point (BF_DATA_POINT_TIER below). `workflow_dispatch`
  # allows a manual full run.
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    # PR/push run the fast sampled data-point tier; the nightly `schedule`
    # (and a manual `workflow_dispatch`) run the full generated-point matrix
    # (#2278).
    env:
      BF_DATA_POINT_TIER: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && 'full' || 'pr' }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Ruby
        uses: ruby/setup-ruby@8e41b362d2589a22a44c1cfa214b3c83052c195b # v1.318.0
        with:
          ruby-version: '3.3'

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/client' build
          bun run --filter '@barefootjs/erb' build

      # tzinfo (#2344): the one runtime gem — named-IANA-zone resolution in
      # `format_date` (loaded lazily; every other helper stays stdlib-only).
      - name: Install runtime gems
        run: gem install tzinfo --no-document

      - name: Run Ruby minitest suite
        run: |
          cd packages/adapter-erb
          for f in test/*_test.rb; do
            ruby -Ilib -Itest "$f" || exit 1
          done

      # The bun conformance suite compiles fixtures to ERB and renders them
      # through the real Ruby runtime installed above (skips gracefully when
      # `ruby` is absent from PATH — present here, so it runs for real).
      - name: Run unit tests (incl. live Ruby render)
        run: bun test packages/adapter-erb
