name: CI — ERB Adapter

on:
  push:
    branches: [main]
    paths:
      - 'packages/client/**'
      - 'packages/shared/**'
      - 'packages/jsx/**'
      - 'packages/adapter-erb/**'
      - 'packages/adapter-tests/**'
      - '.github/workflows/ci-erb.yml'
  pull_request:
    paths:
      - 'packages/client/**'
      - 'packages/shared/**'
      - 'packages/jsx/**'
      - 'packages/adapter-erb/**'
      - 'packages/adapter-tests/**'
      - '.github/workflows/ci-erb.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Not SHA-pinned like the other third-party actions in this repo
      # (actions/checkout, actions-setup-perl) — outbound network access
      # for resolving ruby/setup-ruby's release SHA wasn't available when
      # this workflow was authored. Tighten to a pinned SHA in a follow-up.
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/client' build
          bun run --filter '@barefootjs/erb' build

      - name: Run Ruby minitest suite (stdlib-only runtime, no gems)
        run: |
          cd packages/adapter-erb
          for f in test/*_test.rb; do
            ruby -Ilib -Itest "$f" || exit 1
          done

      # The bun conformance suite compiles fixtures to ERB and renders them
      # through the real Ruby runtime installed above (skips gracefully when
      # `ruby` is absent from PATH — present here, so it runs for real).
      - name: Run unit tests (incl. live Ruby render)
        run: bun test packages/adapter-erb
