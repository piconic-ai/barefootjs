name: CI — Mojolicious Adapter

on:
  push:
    branches: [main]
    paths:
      - 'packages/client/**'
      - 'packages/shared/**'
      - 'packages/jsx/**'
      - 'packages/adapter-perl/**'
      - 'packages/adapter-mojolicious/**'
      - 'packages/adapter-tests/**'
      - '.github/workflows/ci-mojolicious.yml'
  pull_request:
    paths:
      - 'packages/client/**'
      - 'packages/shared/**'
      - 'packages/jsx/**'
      - 'packages/adapter-perl/**'
      - 'packages/adapter-mojolicious/**'
      - 'packages/adapter-tests/**'
      - '.github/workflows/ci-mojolicious.yml'
  # Nightly full-matrix data-point conformance (#2278): PR/push runs the
  # fast `pr` tier (sampled generated points); the scheduled run exercises
  # every generated point (BF_DATA_POINT_TIER below). `workflow_dispatch`
  # allows a manual full run.
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-mojolicious-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # PR/push run the fast sampled data-point tier; the nightly `schedule`
    # (and a manual `workflow_dispatch`) run the full generated-point matrix
    # (#2278).
    env:
      BF_DATA_POINT_TIER: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && 'full' || 'pr' }}

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Perl
        uses: shogo82148/actions-setup-perl@3d3cb73ca65d657a809d97eab324d4e4f140bf5e # v1
        with:
          perl-version: '5.40'

      - name: Install Mojolicious
        # DateTime (#2344): pulls DateTime::TimeZone + DateTime::Duration, the
        # core runtime's full chain for named-IANA-zone resolution in
        # format_date (core tests run below).
        run: cpanm --notest Mojolicious DateTime

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/client' build
          bun run --filter '@barefootjs/mojolicious' build

      - name: Run BarefootJS core Perl tests (engine-agnostic, no Mojo)
        run: cd packages/adapter-perl && prove -lv t/

      - name: Run Mojolicious Perl unit tests
        # The Mojo binding's tests `use BarefootJS`, which now lives in
        # @barefootjs/perl — add its lib to @INC alongside this package's.
        run: cd packages/adapter-mojolicious && prove -lv -I ../adapter-perl/lib t/

      - name: Run unit tests
        run: bun test packages/adapter-mojolicious
