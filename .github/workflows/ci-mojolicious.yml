name: CI — Mojolicious Adapter

on:
  push:
    branches: [main]
    paths:
      - 'packages/client/**'
      - 'packages/shared/**'
      - 'packages/jsx/**'
      - 'packages/adapter-mojolicious/**'
      - 'packages/adapter-tests/**'
      - '.github/workflows/ci-mojolicious.yml'
  pull_request:
    paths:
      - 'packages/client/**'
      - 'packages/shared/**'
      - 'packages/jsx/**'
      - 'packages/adapter-mojolicious/**'
      - 'packages/adapter-tests/**'
      - '.github/workflows/ci-mojolicious.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Perl
        uses: shogo82148/actions-setup-perl@a198315ec4e9244f206879ea7b63078003aec8a6 # v1
        with:
          perl-version: '5.40'

      - name: Install Mojolicious
        run: cpanm --notest Mojolicious

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/client' build
          bun run --filter '@barefootjs/mojolicious' build

      - name: Run Perl unit tests
        run: cd packages/adapter-mojolicious && prove -lv t/

      - name: Run unit tests
        run: bun test packages/adapter-mojolicious
