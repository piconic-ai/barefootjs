name: Deploy Sites

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'site/**'
      - 'ui/**'
      - 'docs/core/**'
      - 'integrations/**'
      - '.github/workflows/deploy.yml'

  # Allow manual trigger with site selection
  workflow_dispatch:
    inputs:
      site:
        description: 'Site to deploy (leave empty to deploy all)'
        required: false
        type: choice
        options:
          - all
          - core
          - ui
          - integrations
          - integrations-hono
          - integrations-h3
          - integrations-elysia
          - integrations-echo
          - integrations-gin
          - integrations-chi
          - integrations-nethttp
          - integrations-mojolicious
          - integrations-xslate
          - integrations-flask
          - integrations-fastapi
          - integrations-sinatra
          - integrations-rails
          - integrations-axum
          - integrations-php
          - integrations-django
          - integrations-blade
          - integrations-laravel

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-core:
    if: >-
      github.event_name == 'workflow_dispatch' && (github.event.inputs.site == 'all' || github.event.inputs.site == 'core')
      || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      # Wrangler 4.x shells out to Node and requires v22+. The runner's
      # default Node 20 makes `bunx wrangler deploy` exit immediately.
      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/client' build

      - name: Build site
        run: cd site/core && bun run build

      - name: Deploy to Cloudflare Workers
        run: cd site/core && bunx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-ui:
    if: >-
      github.event_name == 'workflow_dispatch' && (github.event.inputs.site == 'all' || github.event.inputs.site == 'ui')
      || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      # Wrangler 4.x shells out to Node and requires v22+. The runner's
      # default Node 20 makes `bunx wrangler deploy` exit immediately.
      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/client' build
          bun run --filter '@barefootjs/hono' build
          bun run --filter '@barefootjs/form' build
          bun run --filter '@barefootjs/chart' build
          bun run --filter '@barefootjs/xyflow' build

      - name: Extract component metadata
        run: bun run meta:extract

      - name: Build site
        run: cd site/ui && bun run build:worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy to Cloudflare Workers
