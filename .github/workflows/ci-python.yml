      - name: Upload Playwright report (integrations/django)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-integrations-django
          path: integrations/django/playwright-report/
