name: CI — Python (Jinja2) Adapter

on:
  push:
    branches: [main]
    paths:
      - 'packages/client/**'
      - 'packages/shared/**'
      - 'packages/jsx/**'
      - 'packages/adapter-jinja/**'
      - 'packages/adapter-tests/**'
      - 'integrations/flask/**'
      - 'integrations/fastapi/**'
      - 'integrations/django/**'
      - '.github/workflows/ci-python.yml'
  pull_request:
    paths:
      - 'packages/client/**'
      - 'packages/shared/**'
      - 'packages/jsx/**'
      - 'packages/adapter-jinja/**'
      - 'packages/adapter-tests/**'
      - 'integrations/flask/**'
      - 'integrations/fastapi/**'
      - 'integrations/django/**'
      - '.github/workflows/ci-python.yml'
  # Nightly full-matrix data-point conformance (#2278): PR/push runs the
  # fast `pr` tier (sampled generated points); the scheduled run exercises
  # every generated point (BF_DATA_POINT_TIER below). `workflow_dispatch`
  # allows a manual full run.
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # PR/push run the fast sampled data-point tier; the nightly `schedule`
    # (and a manual `workflow_dispatch`) run the full generated-point matrix
    # (#2278).
    env:
      BF_DATA_POINT_TIER: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && 'full' || 'pr' }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Install jinja2
        run: pip install jinja2

      - name: Run Python runtime unit tests
        # Includes the golden-vector conformance harness (test_helper_vectors.py,
        # test_eval_vectors.py; see spec/template-helpers.md) plus the live
        # Jinja render test (test_render.py).
        run: python3 -m unittest discover -s packages/adapter-jinja/python/tests -t packages/adapter-jinja/python

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/client' build
          bun run --filter '@barefootjs/jinja' build

      # The conformance suite compiles the shared IR fixtures, then renders
      # the emitted Jinja templates through real Jinja2 + the Python
      # BarefootJS runtime (it skips gracefully when `jinja2` is absent —
      # installed above so it runs for real).
      - name: Run unit tests (incl. live Jinja2 render + conformance)
        run: bun test packages/adapter-jinja

  e2e-flask:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r integrations/flask/requirements.txt

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/client' build
          bun run --filter '@barefootjs/jinja' build

      - name: Build integrations/flask
        run: cd integrations/flask && bun run build

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          # Key on package.json (committed, deterministic) — not bun.lock
          # which is gitignored and re-solved per run.
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package.json') }}

      - name: Install Playwright browser binaries
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install chromium

      - name: Run integrations/flask E2E tests
        run: cd integrations/flask && bun run test:e2e

      - name: Upload Playwright report (integrations/flask)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-integrations-flask
          path: integrations/flask/playwright-report/
          retention-days: 30

  e2e-fastapi:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test

    steps:
