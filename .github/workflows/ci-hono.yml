name: CI — Hono Adapter

on:
  push:
    branches: [main]
    paths:
      - 'packages/client/**'
      - 'packages/jsx/**'
      - 'packages/adapter-hono/**'
      - 'packages/preview/**'
      - 'packages/adapter-tests/**'
      - 'integrations/hono/**'
      - '.github/workflows/ci-hono.yml'
  pull_request:
    paths:
      - 'packages/client/**'
      - 'packages/jsx/**'
      - 'packages/adapter-hono/**'
      - 'packages/preview/**'
      - 'packages/adapter-tests/**'
      - 'integrations/hono/**'
      - '.github/workflows/ci-hono.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/client' build
          bun run --filter '@barefootjs/router' build
          bun run --filter '@barefootjs/hono' build

      - name: Run unit tests
        run: bun test packages/adapter-hono

  e2e-hono:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      # Wrangler (invoked by Playwright's webServer below) shells out to
      # Node and requires v22+. The runner's default Node 20 makes
      # `bunx wrangler dev` exit immediately. Pin Node here.
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/client' build
          bun run --filter '@barefootjs/router' build
          bun run --filter '@barefootjs/hono' build

      - name: Build integrations/hono
        run: cd integrations/hono && bun run build

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.cache/ms-playwright
          # Key on package.json (committed, deterministic) — not bun.lock
          # which is gitignored and re-solved per run.
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package.json') }}

      - name: Install Playwright browser binaries
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install chromium

      - name: Run integrations/hono E2E tests
        run: cd integrations/hono && bun run test:e2e

      - name: Upload Playwright report (integrations/hono)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-integrations-hono
          path: integrations/hono/playwright-report/
          retention-days: 30
