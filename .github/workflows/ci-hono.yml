name: CI — Hono Adapter

on:
  push:
    branches: [main]
    paths:
      - 'packages/client/**'
      - 'packages/jsx/**'
      - 'packages/adapter-hono/**'
      - 'packages/preview/**'
      - 'packages/adapter-tests/**'
      - 'integrations/hono/**'
      - '.github/workflows/ci-hono.yml'
  pull_request:
    paths:
      - 'packages/client/**'
      - 'packages/jsx/**'
      - 'packages/adapter-hono/**'
      - 'packages/preview/**'
      - 'packages/adapter-tests/**'
      - 'integrations/hono/**'
      - '.github/workflows/ci-hono.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/client' build
          bun run --filter '@barefootjs/hono' build

      - name: Run unit tests
        run: bun test packages/adapter-hono

  e2e-hono:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      # Wrangler (invoked by Playwright's webServer below) shells out to
      # Node and requires v22+. The runner's default Node 20 makes
      # `bunx wrangler dev` exit immediately. Pin Node here.
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/client' build
          bun run --filter '@barefootjs/hono' build

      - name: Build integrations/hono
        run: cd integrations/hono && bun run build

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          # Key on package.json (committed, deterministic) — not bun.lock
          # which is gitignored and re-solved per run.
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package.json') }}

      - name: Install Playwright browser binaries
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install chromium

      - name: Run integrations/hono E2E tests
        run: cd integrations/hono && bun run test:e2e

      - name: Upload Playwright report (integrations/hono)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-integrations-hono
          path: integrations/hono/playwright-report/
          retention-days: 30
