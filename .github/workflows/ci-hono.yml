name: CI — Hono Adapter

on:
  push:
    branches: [main]
    paths:
      - 'packages/client/**'
      - 'packages/jsx/**'
      - 'packages/hono/**'
      - 'packages/preview/**'
      - 'packages/adapter-tests/**'
      - 'integrations/hono/**'
      - '.github/workflows/ci-hono.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/client/**'
      - 'packages/jsx/**'
      - 'packages/hono/**'
      - 'packages/preview/**'
      - 'packages/adapter-tests/**'
      - 'integrations/hono/**'
      - '.github/workflows/ci-hono.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/client' build
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/hono' build

      - name: Run unit tests
        run: bun test packages/hono

  e2e-hono:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/client' build
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/hono' build

      - name: Build integrations/hono
        run: cd integrations/hono && bun run build

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # Key on package.json (committed, deterministic) — not bun.lock
          # which is gitignored and re-solved per run.
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package.json') }}

      - name: Install Playwright browser binaries
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install chromium

      - name: Install Playwright system deps
        run: bunx playwright install-deps chromium

      - name: Run integrations/hono E2E tests
        run: cd integrations/hono && bun run test:e2e

      - name: Upload Playwright report (integrations/hono)
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-integrations-hono
          path: integrations/hono/playwright-report/
          retention-days: 30
