name: CI — Elysia Integration

on:
  push:
    branches: [main]
    paths:
      - 'packages/client/**'
      - 'packages/jsx/**'
      - 'packages/adapter-hono/**'
      - 'integrations/elysia/**'
      - 'integrations/shared/**'
      - '.github/workflows/ci-elysia.yml'
  pull_request:
    paths:
      - 'packages/client/**'
      - 'packages/jsx/**'
      - 'packages/adapter-hono/**'
      - 'integrations/elysia/**'
      - 'integrations/shared/**'
      - '.github/workflows/ci-elysia.yml'

permissions:
  contents: read

concurrency:
  group: ci-elysia-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-elysia:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install dependencies
        run: bun install

      # The Elysia server imports compiled SSR templates from @barefootjs/hono
      # and the runtime bundle (barefoot.js) from @barefootjs/client, so build
      # the packages before the integration build the Playwright webServer runs.
      - name: Build packages
        run: |
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/client' build
          bun run --filter '@barefootjs/hono' build

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package.json') }}

      - name: Install Playwright browser binaries
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install chromium

      - name: Run integrations/elysia E2E tests
        run: cd integrations/elysia && bun run test:e2e

      - name: Upload Playwright report (integrations/elysia)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-integrations-elysia
          path: integrations/elysia/playwright-report/
          retention-days: 30
