name: CI — Compat lockfile

on:
  push:
    branches: [main]
    paths:
      - 'ui/components/**'
      - 'ui/compat.lock.json'
      - 'ui/support-matrix.lock.json'
      - 'packages/jsx/**'
      - 'packages/client/**'
      - 'packages/cli/**'
      - 'packages/compat/**'
      - 'packages/adapter-tests/coverage-map.json'
      - 'packages/adapter-erb/**'
      - 'packages/adapter-go-template/**'
      - 'packages/adapter-hono/**'
      - 'packages/adapter-jinja/**'
      - 'packages/adapter-mojolicious/**'
      - 'packages/adapter-rust/**'
      - 'packages/adapter-twig/**'
      - 'packages/adapter-xslate/**'
      - '.github/workflows/ci-compat.yml'
  pull_request:
    paths:
      - 'ui/components/**'
      - 'ui/compat.lock.json'
      - 'ui/support-matrix.lock.json'
      - 'packages/jsx/**'
      - 'packages/client/**'
      - 'packages/cli/**'
      - 'packages/compat/**'
      - 'packages/adapter-tests/coverage-map.json'
      - 'packages/adapter-erb/**'
      - 'packages/adapter-go-template/**'
      - 'packages/adapter-hono/**'
      - 'packages/adapter-jinja/**'
      - 'packages/adapter-mojolicious/**'
      - 'packages/adapter-rust/**'
      - 'packages/adapter-twig/**'
      - 'packages/adapter-xslate/**'
      - '.github/workflows/ci-compat.yml'

permissions:
  contents: read

jobs:
  lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/client' build
          # packages/compat (the compat engine + `bun run compat:lock`)
          # imports every workspace adapter. These 8 have `main`/`exports`
          # pointing at `./dist/index.js` (unlike @barefootjs/hono and
          # @barefootjs/jsx, which resolve via `./src/index.ts`), so they
          # MUST be built before anything imports them (see #2099).
          bun run --filter '@barefootjs/blade' build
          bun run --filter '@barefootjs/erb' build
          bun run --filter '@barefootjs/go-template' build
          bun run --filter '@barefootjs/jinja' build
          bun run --filter '@barefootjs/mojolicious' build
          bun run --filter '@barefootjs/rust' build
          bun run --filter '@barefootjs/twig' build
          bun run --filter '@barefootjs/xslate' build

      # Tests first: a broken compat engine (or a stale conformancePins
      # entry) should fail loudly here rather than surface as a confusing
      # lockfile diff in the next step.
      - name: Test compat engine
        run: bun test packages/compat

      - name: Regenerate compat lockfile
        run: bun run compat:lock

      # Renders the freshly regenerated matrix on the run's Summary page —
      # runs before the drift gate so the matrix is visible even when the
      # gate below then fails.
      - name: Publish matrix to job summary
        run: bun run compat --render ui/compat.lock.json >> "$GITHUB_STEP_SUMMARY"

      - name: Check for drift
        run: |
          if ! git diff --exit-code -- ui/compat.lock.json; then
            echo "::error::ui/compat.lock.json is out of date. Run 'bun run compat:lock' locally and commit the result."
            exit 1
          fi

      - name: Regenerate support matrix lockfile
        run: bun run support-matrix:lock

      - name: Check support matrix for drift
        run: |
          if ! git diff --exit-code -- ui/support-matrix.lock.json; then
            echo "::error::ui/support-matrix.lock.json is out of date. Run 'bun run support-matrix:lock' locally and commit the result."
            exit 1
          fi
