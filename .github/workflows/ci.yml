name: CI — Core

on:
  push:
    branches: [main]
    paths:
      - 'packages/client/**'
      - 'packages/client-runtime/**'
      - 'packages/jsx/**'
      - 'packages/form/**'
      - 'packages/test/**'
      - 'packages/chart/**'
      - 'packages/adapter-tests/**'
      - 'ui/**'
      - 'site/ui/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/client/**'
      - 'packages/client-runtime/**'
      - 'packages/jsx/**'
      - 'packages/form/**'
      - 'packages/test/**'
      - 'packages/chart/**'
      - 'packages/adapter-tests/**'
      - 'ui/**'
      - 'site/ui/**'
      - '.github/workflows/ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/client' build
          bun run --filter '@barefootjs/client-runtime' build
          bun run --filter '@barefootjs/jsx' build

      - name: Run unit tests
        run: bun test packages/client packages/client-runtime packages/jsx packages/test packages/adapter-tests

  test-ui:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/client' build
          bun run --filter '@barefootjs/client-runtime' build
          bun run --filter '@barefootjs/jsx' build

      - name: Run UI component IR tests
        run: bun test ui/components/

  e2e-site-ui:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/client' build
          bun run --filter '@barefootjs/client-runtime' build
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/form' build
          bun run --filter '@barefootjs/chart' build
          bun run --filter '@barefootjs/hono' build

      - name: Build site/ui
        run: cd site/ui && bun run build

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run site/ui E2E tests
        run: cd site/ui && bun run test:e2e

      - name: Upload Playwright report (site/ui)
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-site-ui
          path: site/ui/playwright-report/
          retention-days: 30

  e2e-echo:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/client' build
          bun run --filter '@barefootjs/client-runtime' build
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/go-template' build

      - name: Build examples/echo
        run: cd examples/echo && bun run build

      - name: Download Go dependencies
        run: cd examples/echo && go mod download

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run examples/echo E2E tests
        run: cd examples/echo && bun run test:e2e

      - name: Upload Playwright report (examples/echo)
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-examples-echo
          path: examples/echo/playwright-report/
          retention-days: 30
