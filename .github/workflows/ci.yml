name: CI — Core

on:
  push:
    branches: [main]
    paths:
      - 'packages/client/**'
      - 'packages/jsx/**'
      - 'packages/form/**'
      - 'packages/test/**'
      - 'packages/chart/**'
      - 'packages/xyflow/**'
      - 'packages/adapter-tests/**'
      # site/ui is the Hono adapter's end-to-end target, so Hono changes must
      # re-run this workflow's e2e-site-ui job (ci-hono.yml no longer duplicates it).
      - 'packages/adapter-hono/**'
      # The CLI compiles site/ui, so cli changes can break the e2e-site-ui
      # job without touching any other gated path.
      - 'packages/cli/**'
      - 'ui/**'
      - 'site/ui/**'
      - '.github/workflows/ci.yml'
      # Central divergence validation in adapter-tests re-checks every
      # adapter's declarations, so it must re-run when any adapter edits its.
      - 'packages/**/vector-divergences.json'
      - 'scripts/ci/shard-test-files.ts'
  pull_request:
    paths:
      - 'packages/client/**'
      - 'packages/jsx/**'
      - 'packages/form/**'
      - 'packages/test/**'
      - 'packages/chart/**'
      - 'packages/xyflow/**'
      - 'packages/adapter-tests/**'
      # site/ui is the Hono adapter's end-to-end target, so Hono changes must
      # re-run this workflow's e2e-site-ui job (ci-hono.yml no longer duplicates it).
      - 'packages/adapter-hono/**'
      # The CLI compiles site/ui, so cli changes can break the e2e-site-ui
      # job without touching any other gated path.
      - 'packages/cli/**'
      - 'ui/**'
      - 'site/ui/**'
      - '.github/workflows/ci.yml'
      # Central divergence validation in adapter-tests re-checks every
      # adapter's declarations, so it must re-run when any adapter edits its.
      - 'packages/**/vector-divergences.json'
      - 'scripts/ci/shard-test-files.ts'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: test (${{ matrix.group }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # jsx-1/jsx-2 split packages/jsx's 178 test files into two
          # size-balanced shards (see scripts/ci/shard-test-files.ts) since
          # jsx dominates unit test wall time (~300-440s vs ~25-180s for the
          # other packages). `rest` covers everything else in one runner.
          - group: jsx-1
            run: bun test $(bun scripts/ci/shard-test-files.ts packages/jsx 1 2)
          - group: jsx-2
            run: bun test $(bun scripts/ci/shard-test-files.ts packages/jsx 2 2)
          - group: rest
            run: bun test packages/client packages/test packages/adapter-tests

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/client' build

      - name: Run unit tests
        run: ${{ matrix.run }}

  test-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/client' build

      - name: Run UI component IR tests
        run: bun test ui/components/

  e2e-site-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/client' build
          bun run --filter '@barefootjs/form' build
          bun run --filter '@barefootjs/chart' build
          bun run --filter '@barefootjs/xyflow' build
          bun run --filter '@barefootjs/hono' build

      - name: Build site/ui
        run: cd site/ui && bun run build

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          # Key on package.json (committed, deterministic) — not bun.lock
          # which is gitignored and re-solved per run.
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package.json') }}

      - name: Install Playwright browser binaries
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install chromium

      - name: Run site/ui E2E tests (shard ${{ matrix.shard }}/4)
        run: cd site/ui && bunx playwright test --shard=${{ matrix.shard }}/4

      - name: Upload Playwright report (site/ui)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-site-ui-shard-${{ matrix.shard }}
          path: site/ui/playwright-report/
          retention-days: 30
