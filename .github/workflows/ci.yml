name: CI — Core

on:
  push:
    branches: [main]
    paths:
      - 'packages/client/**'
      - 'packages/jsx/**'
      - 'packages/form/**'
      - 'packages/test/**'
      - 'packages/chart/**'
      - 'packages/xyflow/**'
      - 'packages/adapter-tests/**'
      # site/ui is the Hono adapter's end-to-end target, so Hono changes must
      # re-run this workflow's e2e-site-ui job (ci-hono.yml no longer duplicates it).
      - 'packages/adapter-hono/**'
      # The CLI compiles site/ui, so cli changes can break the e2e-site-ui
      # job without touching any other gated path.
      - 'packages/cli/**'
      - 'ui/**'
      - 'site/ui/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'packages/client/**'
      - 'packages/jsx/**'
      - 'packages/form/**'
      - 'packages/test/**'
      - 'packages/chart/**'
      - 'packages/xyflow/**'
      - 'packages/adapter-tests/**'
      # site/ui is the Hono adapter's end-to-end target, so Hono changes must
      # re-run this workflow's e2e-site-ui job (ci-hono.yml no longer duplicates it).
      - 'packages/adapter-hono/**'
      # The CLI compiles site/ui, so cli changes can break the e2e-site-ui
      # job without touching any other gated path.
      - 'packages/cli/**'
      - 'ui/**'
      - 'site/ui/**'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/client' build

      - name: Run unit tests
        run: bun test packages/client packages/jsx packages/test packages/adapter-tests

  test-ui:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/client' build

      - name: Run UI component IR tests
        run: bun test ui/components/

  e2e-site-ui:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/client' build
          bun run --filter '@barefootjs/form' build
          bun run --filter '@barefootjs/chart' build
          bun run --filter '@barefootjs/xyflow' build
          bun run --filter '@barefootjs/hono' build

      - name: Build site/ui
        run: cd site/ui && bun run build

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.cache/ms-playwright
          # Key on package.json (committed, deterministic) — not bun.lock
          # which is gitignored and re-solved per run.
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package.json') }}

      - name: Install Playwright browser binaries
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install chromium

      - name: Run site/ui E2E tests (shard ${{ matrix.shard }}/4)
        run: cd site/ui && bunx playwright test --shard=${{ matrix.shard }}/4

      - name: Upload Playwright report (site/ui)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-site-ui-shard-${{ matrix.shard }}
          path: site/ui/playwright-report/
          retention-days: 30
