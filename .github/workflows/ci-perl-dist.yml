name: CI — Perl CPAN dists

# Verifies the three Perl distributions assemble, test, and build as CPAN
# tarballs via Makefile.PL / make. This is the "buildable/testable" check
# for the dist packaging — it does not publish to CPAN.

on:
  push:
    branches: [main]
    paths:
      - 'packages/adapter-perl/**'
      - 'packages/adapter-xslate/**'
      - 'packages/adapter-mojolicious/**'
      - '.github/workflows/ci-perl-dist.yml'
  pull_request:
    paths:
      - 'packages/adapter-perl/**'
      - 'packages/adapter-xslate/**'
      - 'packages/adapter-mojolicious/**'
      - '.github/workflows/ci-perl-dist.yml'

permissions:
  contents: read

concurrency:
  group: ci-perl-dist-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dist:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Perl
        uses: shogo82148/actions-setup-perl@3d3cb73ca65d657a809d97eab324d4e4f140bf5e # v1
        with:
          perl-version: '5.40'

      - name: Install build tool + dist dependencies
        # DateTime (#2344): pulls DateTime::TimeZone + DateTime::Duration —
        # the full runtime chain for named-IANA-zone resolution in format_date.
        run: cpanm --notest Module::CPANfile Test2::Suite Text::Xslate Mojolicious DateTime

      # Core must be built and installed first so the backend dists can resolve
      # `requires 'BarefootJS'` from their cpanfile.
      - name: Build, test & install core (BarefootJS)
        working-directory: packages/adapter-perl
        run: |
          perl Makefile.PL
          make test
          make dist
          cpanm --notest BarefootJS-*.tar.gz

      - name: Build & test BarefootJS-Backend-Xslate
        working-directory: packages/adapter-xslate
        run: |
          perl Makefile.PL
          make test
          make dist

      - name: Build & test Mojolicious-Plugin-BarefootJS
        working-directory: packages/adapter-mojolicious
        run: |
          perl Makefile.PL
          make test
          make dist
