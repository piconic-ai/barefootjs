name: CI — Perl CPAN dists

# Verifies the three Perl distributions assemble, test, and build as CPAN
# tarballs via Makefile.PL / make. This is the "buildable/testable" check
# for the dist packaging — it does not publish to CPAN.

on:
  push:
    branches: [main]
    paths:
      - 'packages/adapter-perl/**'
      - 'packages/adapter-xslate/lib/**'
      - 'packages/adapter-xslate/Makefile.PL'
      - 'packages/adapter-xslate/MANIFEST'
      - 'packages/adapter-xslate/cpanfile'
      - 'packages/adapter-xslate/t/**'
      - 'packages/adapter-mojolicious/lib/**'
      - 'packages/adapter-mojolicious/Makefile.PL'
      - 'packages/adapter-mojolicious/MANIFEST'
      - 'packages/adapter-mojolicious/cpanfile'
      - 'packages/adapter-mojolicious/t/**'
      - '.github/workflows/ci-perl-dist.yml'
  pull_request:
    paths:
      - 'packages/adapter-perl/**'
      - 'packages/adapter-xslate/lib/**'
      - 'packages/adapter-xslate/Makefile.PL'
      - 'packages/adapter-xslate/MANIFEST'
      - 'packages/adapter-xslate/cpanfile'
      - 'packages/adapter-xslate/t/**'
      - 'packages/adapter-mojolicious/lib/**'
      - 'packages/adapter-mojolicious/Makefile.PL'
      - 'packages/adapter-mojolicious/MANIFEST'
      - 'packages/adapter-mojolicious/cpanfile'
      - 'packages/adapter-mojolicious/t/**'
      - '.github/workflows/ci-perl-dist.yml'

permissions:
  contents: read

jobs:
  dist:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Perl
        uses: shogo82148/actions-setup-perl@a198315ec4e9244f206879ea7b63078003aec8a6 # v1
        with:
          perl-version: '5.40'

      - name: Install build tool + dist dependencies
        run: cpanm --notest Module::CPANfile Test2::Suite Text::Xslate Mojolicious

      # Core must be built and installed first so the backend dists can resolve
      # `requires 'BarefootJS'` from their cpanfile.
      - name: Build, test & install core (BarefootJS)
        working-directory: packages/adapter-perl
        run: |
          perl Makefile.PL
          make test
          make dist
          cpanm --notest BarefootJS-*.tar.gz

      - name: Build & test BarefootJS-Backend-Xslate
        working-directory: packages/adapter-xslate
        run: |
          perl Makefile.PL
          make test
          make dist

      - name: Build & test Mojolicious-Plugin-BarefootJS
        working-directory: packages/adapter-mojolicious
        run: |
          perl Makefile.PL
          make test
          make dist
