name: CI — Go Template Adapter

on:
  push:
    branches: [main]
    paths:
      - 'packages/client/**'
      - 'packages/jsx/**'
      - 'packages/go-template/**'
      - 'packages/preview/**'
      - 'packages/adapter-tests/**'
      - 'integrations/echo/**'
      - '.github/workflows/ci-go-template.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/client/**'
      - 'packages/jsx/**'
      - 'packages/go-template/**'
      - 'packages/preview/**'
      - 'packages/adapter-tests/**'
      - 'integrations/echo/**'
      - '.github/workflows/ci-go-template.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/client' build
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/go-template' build

      - name: Pre-warm Go build cache
        run: cd packages/go-template/runtime && GOTOOLCHAIN=local go build ./...

      - name: Run unit tests
        run: bun test packages/go-template

  e2e-echo:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/client' build
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/go-template' build

      - name: Build integrations/echo
        run: cd integrations/echo && bun run build

      - name: Download Go dependencies
        run: cd integrations/echo && go mod download

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run integrations/echo E2E tests
        run: cd integrations/echo && bun run test:e2e

      - name: Upload Playwright report (integrations/echo)
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-integrations-echo
          path: integrations/echo/playwright-report/
          retention-days: 30
