name: CI — Go Template Adapter

on:
  push:
    branches: [main]
    paths:
      - 'packages/client/**'
      - 'packages/jsx/**'
      - 'packages/adapter-go-template/**'
      - 'packages/preview/**'
      - 'packages/adapter-tests/**'
      - 'integrations/echo/**'
      - '.github/workflows/ci-go-template.yml'
  pull_request:
    paths:
      - 'packages/client/**'
      - 'packages/jsx/**'
      - 'packages/adapter-go-template/**'
      - 'packages/preview/**'
      - 'packages/adapter-tests/**'
      - 'integrations/echo/**'
      - '.github/workflows/ci-go-template.yml'
  # Nightly full-matrix data-point conformance (#2278): PR/push runs the
  # fast `pr` tier (sampled generated points); the scheduled run exercises
  # every generated point (BF_DATA_POINT_TIER below). `workflow_dispatch`
  # allows a manual full run.
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-go-template-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # PR/push run the fast sampled data-point tier; the nightly `schedule`
    # (and a manual `workflow_dispatch`) run the full generated-point matrix
    # (#2278).
    env:
      BF_DATA_POINT_TIER: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && 'full' || 'pr' }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25'

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/client' build
          bun run --filter '@barefootjs/go-template' build

      - name: Pre-warm Go build cache
        run: cd packages/adapter-go-template/runtime && GOTOOLCHAIN=local go build ./...

      - name: Run Go runtime unit tests
        # Includes the golden-vector conformance harness (vectors_test.go,
        # see spec/template-helpers.md).
        run: cd packages/adapter-go-template/runtime && GOTOOLCHAIN=local go test ./...

      - name: Run unit tests
        run: bun test packages/adapter-go-template

  e2e-echo:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25'

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/client' build
          bun run --filter '@barefootjs/go-template' build

      - name: Build integrations/echo
        run: cd integrations/echo && bun run build

      # #2327: generated components.go must not drift from the compiler.
      # `bun run build` regenerates into the working tree and the E2E below
      # runs against that fresh output, so a stale COMMITTED file used to
      # pass CI silently (how the #2267 interface{} flip went unregenerated
      # for four integrations). chi/gin/nethttp are built here only to feed
      # the drift check — echo carries the E2E coverage. Same gate pattern
      # as ci-compat.yml's lockfile drift check.
      - name: Build remaining Go integrations (drift-check inputs)
        run: |
          (cd integrations/chi && bun run build)
          (cd integrations/gin && bun run build)
          (cd integrations/nethttp && bun run build)

      - name: Check generated components.go for drift
        run: |
          if ! git diff --exit-code -- integrations/chi/components.go integrations/echo/components.go integrations/gin/components.go integrations/nethttp/components.go; then
            echo "::error::integrations/*/components.go are out of date. Run 'bun run build' in each Go integration and commit the result."
            exit 1
          fi

      - name: Download Go dependencies
        run: cd integrations/echo && go mod download

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          # Key on package.json (committed, deterministic) — not bun.lock
          # which is gitignored and re-solved per run.
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package.json') }}

      - name: Install Playwright browser binaries
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install chromium

      - name: Run integrations/echo E2E tests
        run: cd integrations/echo && bun run test:e2e

      - name: Upload Playwright report (integrations/echo)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-integrations-echo
          path: integrations/echo/playwright-report/
          retention-days: 30
