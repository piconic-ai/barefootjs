name: CI — Form

on:
  push:
    branches: [main]
    paths:
      - 'packages/form/**'
      - 'packages/client/**'
      - '.github/workflows/ci-form.yml'
  pull_request:
    paths:
      - 'packages/form/**'
      - 'packages/client/**'
      - '.github/workflows/ci-form.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install dependencies
        run: bun install

      - name: Build dependencies
        run: |
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/client' build

      - name: Type check
        run: cd packages/form && npx tsc --noEmit

      - name: Run tests
        run: bun test --cwd packages/form

      - name: Build
        run: cd packages/form && bun run build
