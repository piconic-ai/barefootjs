name: CI — Xslate Adapter

on:
  push:
    branches: [main]
    paths:
      - 'packages/client/**'
      - 'packages/shared/**'
      - 'packages/jsx/**'
      - 'packages/adapter-perl/**'
      - 'packages/adapter-xslate/**'
      - 'packages/adapter-tests/**'
      - '.github/workflows/ci-xslate.yml'
  pull_request:
    paths:
      - 'packages/client/**'
      - 'packages/shared/**'
      - 'packages/jsx/**'
      - 'packages/adapter-perl/**'
      - 'packages/adapter-xslate/**'
      - 'packages/adapter-tests/**'
      - '.github/workflows/ci-xslate.yml'
  # Nightly full-matrix data-point conformance (#2278): PR/push runs the
  # fast `pr` tier (sampled generated points); the scheduled run exercises
  # every generated point (BF_DATA_POINT_TIER below). `workflow_dispatch`
  # allows a manual full run.
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-xslate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # PR/push run the fast sampled data-point tier; the nightly `schedule`
    # (and a manual `workflow_dispatch`) run the full generated-point matrix
    # (#2278).
    env:
      BF_DATA_POINT_TIER: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && 'full' || 'pr' }}

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Perl
        uses: shogo82148/actions-setup-perl@3d3cb73ca65d657a809d97eab324d4e4f140bf5e # v1
        with:
          perl-version: '5.40'

      - name: Install Text::Xslate
        # DateTime (#2344): pulls DateTime::TimeZone + DateTime::Duration, the
        # core runtime's full chain for named-IANA-zone resolution in
        # format_date (fixture renders below go through the shared
        # BarefootJS.pm runtime).
        run: cpanm --notest Text::Xslate DateTime

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/client' build
          bun run --filter '@barefootjs/xslate' build

      # The render test compiles the Counter, then renders the emitted Kolon
      # `.tx` through real Text::Xslate + the BarefootJS runtime (it skips
      # gracefully when Text::Xslate is absent — installed above so it runs).
      - name: Run unit tests (incl. live Text::Xslate render)
        run: bun test packages/adapter-xslate
