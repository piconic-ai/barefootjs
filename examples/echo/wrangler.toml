name = "barefootjs-echo-example"
main = "container.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[containers]]
class_name = "EchoContainer"
image = "./Dockerfile"
# Build from the repo root so the go.mod `replace` directive pointing at
# ../../packages/go-template/runtime can resolve inside the image.
image_build_context = "../.."
max_instances = 1

[[durable_objects.bindings]]
name = "ECHO_CONTAINER"
class_name = "EchoContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["EchoContainer"]

# Two patterns: `/examples/echo/*` matches /examples/echo/... but not the
# bare /examples/echo, so add the no-slash variant explicitly.
[[routes]]
pattern = "barefootjs.dev/examples/echo"
zone_name = "barefootjs.dev"

[[routes]]
pattern = "barefootjs.dev/examples/echo/*"
zone_name = "barefootjs.dev"

[vars]
BASE_PATH = "/examples/echo"
